# ============================================================
# Configuracao do pipeline de dados — Projeto Final (FIA/LABDATA)
# Home Credit Default Risk | Ponto iii (ABT)
# Centraliza caminhos, parametros e metadados usados por
# data_sanitization.py (raw -> clean) e abt_transform.py (clean -> abt)
# ============================================================

project: "Home Credit Default Risk - Risco de Credito"

# Caminhos relativos a raiz do projeto (pasta 'Projeto Final - TCC')
paths:
  raw:   "home-credit-default-risk/application_train.csv"   # base bruta (Kaggle)
  clean: "Dados/clean_data.csv"                             # saida do data_sanitization
  abt:   "Dados/abt.csv"                                    # saida do abt_transform

target_columns:
  id: "SK_ID_CURR"        # chave do cliente/solicitacao
  target: "TARGET"        # 1 = inadimplente, 0 = adimplente

# ---------- Parametros da etapa de limpeza ----------
sanitization:
  # Valor sentinela (~1000 anos) que significa "nao se aplica" -> vira NaN
  days_employed_sentinel: 365243
  # Categorias invalidas tratadas como ausentes
  xna_to_nan: ["CODE_GENDER", "ORGANIZATION_TYPE"]
  # Renda absurda (outlier conhecido) acima deste corte -> NaN (sera imputada)
  income_cap: 100000000      # 100 mi

# ---------- Parametros da construcao da ABT ----------
abt:
  null_drop_threshold: 0.60      # descarta colunas com mais de 60% de nulos
  onehot_max_cardinality: 12     # categorica com ate 12 niveis -> one-hot
  # categoricas de alta cardinalidade -> frequency encoding (evita explodir colunas)
  freq_encode_cols: ["ORGANIZATION_TYPE", "OCCUPATION_TYPE"]
  numeric_impute: "median"       # estrategia de imputacao numerica
  cast_float32: true             # reduz memoria/tamanho do arquivo

columns_to_drop: #colunas que serão removidas, de acordo com a análise dos dados
  # Variáveis redundantes
  - DAYS_BIRTH
  - DAYS_EMPLOYED

  # Flags de documentos (mantém apenas FLAG_DOCUMENT_3)
  - FLAG_DOCUMENT_2
  - FLAG_DOCUMENT_4
  - FLAG_DOCUMENT_5
  - FLAG_DOCUMENT_6
  - FLAG_DOCUMENT_7
  - FLAG_DOCUMENT_8
  - FLAG_DOCUMENT_9
  - FLAG_DOCUMENT_10
  - FLAG_DOCUMENT_11
  - FLAG_DOCUMENT_12
  - FLAG_DOCUMENT_13
  - FLAG_DOCUMENT_14
  - FLAG_DOCUMENT_15
  - FLAG_DOCUMENT_16
  - FLAG_DOCUMENT_17
  - FLAG_DOCUMENT_18
  - FLAG_DOCUMENT_19
  - FLAG_DOCUMENT_20
  - FLAG_DOCUMENT_21

  # Flags de contato
  - FLAG_MOBIL
  - FLAG_CONT_MOBILE
  - FLAG_PHONE
  - FLAG_EMAIL

  # Features de imóvel (MODE)
  - APARTMENTS_MODE
  - BASEMENTAREA_MODE
  - YEARS_BEGINEXPLUATATION_MODE
  - ELEVATORS_MODE
  - ENTRANCES_MODE
  - FLOORSMAX_MODE
  - LANDAREA_MODE
  - LIVINGAREA_MODE
  - NONLIVINGAREA_MODE
  - FLOORSMIN_MODE
  - LIVINGAPARTMENTS_MODE
  - NONLIVINGAPARTMENTS_MODE
  - COMMONAREA_MODE
  - YEARS_BUILD_MODE

  # Features de imóvel (MEDI)
  - APARTMENTS_MEDI
  - BASEMENTAREA_MEDI
  - YEARS_BEGINEXPLUATATION_MEDI
  - ELEVATORS_MEDI
  - ENTRANCES_MEDI
  - FLOORSMAX_MEDI
  - LANDAREA_MEDI
  - LIVINGAREA_MEDI
  - NONLIVINGAREA_MEDI
  - FLOORSMIN_MEDI
  - LIVINGAPARTMENTS_MEDI
  - NONLIVINGAPARTMENTS_MEDI
  - COMMONAREA_MEDI
  - YEARS_BUILD_MEDI

metadata:
  autor: "Daniel, Claudia"
  etapa_crisp_dm: "Data Preparation (ABT)"
  descricao: "Visao analitica em granularidade de solicitacao de credito, pronta para modelagem de classificacao binaria."
